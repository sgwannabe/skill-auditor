name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Unit tests
        run: python -m unittest -v tests/test_auditor.py
      - name: Self scan smoke
        run: python auditor.py --target . --exclude '.git/*,__pycache__/*,node_modules/*,report.json' --fail-on never
